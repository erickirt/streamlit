syntax = "proto3";

import "streamlit/proto/LabelVisibility.proto";

message Radio {
  string id = 1;
  string label = 2;
  optional int32 default = 3;
  repeated string options = 4;
  string help = 5;
  string form_id = 6;
  optional string raw_value = 13;

  bool set_value = 8;
  bool disabled = 9;
  bool horizontal = 10;
  LabelVisibility label_visibility = 11;
  repeated string captions = 12;
  // If set, widget value is bound to this query parameter key
  optional string query_param_key = 14;

  reserved 7;
  // Next: 15
}
