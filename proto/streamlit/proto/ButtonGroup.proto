syntax = "proto3";

import "streamlit/proto/LabelVisibility.proto";

message ButtonGroup {
  enum ClickMode {
    SINGLE_SELECT = 0;
    MULTI_SELECT = 1;
  }

  message Option {
    string content = 1;
    // when set, this is the icon that will be displayed next to the option
    optional string content_icon = 3;

    reserved 2, 4;
    reserved "selected_content", "selected_content_icon";
  }

  string id = 1;
  repeated Option options = 2;
  // default is an array of indexes that are selected by default
  repeated uint32 default = 3;
  bool disabled = 4;
  ClickMode click_mode = 5;
  string form_id = 6;

  bool set_value = 8;

  enum Style {
    SEGMENTED_CONTROL = 0;
    PILLS = 1;
  }
  Style style = 10;

  string label = 11;
  LabelVisibility label_visibility = 12;
  optional string help = 13;

  // For multi-select mode, this contains all selected option strings.
  // For single-select mode, this contains at most one selected option string.
  repeated string raw_values = 14;

  // If set, widget value is bound to this query parameter key
  optional string query_param_key = 15;

  reserved 7, 9;
  // next id: 16
}
