name: Load Testing

on:
  push:
    branches:
      - develop
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      concurrent_users:
        description: "Number of concurrent users"
        required: false
        default: "80"
      scenario:
        description: "Scenario to run (simple_app, dataframe_app, widget_heavy_app, caching_app, fragment_app, many_messages_app, or leave empty for all)"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: load-testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  load-test:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'run-load-testing')
    runs-on: ubuntu-latest-64-cores
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      - name: Remove run-load-testing label
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/run-load-testing \
            --method DELETE || true

      - name: Checkout Streamlit code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/head', github.event.pull_request.number) || '' }}
          persist-credentials: false
          submodules: "recursive"
          fetch-depth: 2

      - name: Set Python version vars
        uses: ./.github/actions/build_info

      - name: Setup virtual env
        uses: ./.github/actions/make_init
        with:
          python_version: ${{ env.PYTHON_MAX_VERSION }}

      - name: Install playwright
        uses: ./.github/actions/playwright_install

      - name: Build frontend
        run: make frontend-fast

      - name: Run load tests
        env:
          CONCURRENT_USERS: ${{ inputs.concurrent_users || '80' }}
          SCENARIO_FILTER: ${{ inputs.scenario }}
          GITHUB_RUNNER: ubuntu-latest-64-cores
        run: |
          cd e2e_playwright/load_testing
          mkdir -p results
          # Build pytest args as an array to handle spaces in scenario filter safely
          PYTEST_ARGS=(-v --tb=short --browser chromium "--num-sessions=$CONCURRENT_USERS" --results-dir=results)
          if [ -n "$SCENARIO_FILTER" ]; then
            PYTEST_ARGS+=(-k "$SCENARIO_FILTER")
          fi
          uv run pytest test_load.py "${PYTEST_ARGS[@]}"

      - name: Generate summary report
        if: always()
        run: |
          cd e2e_playwright/load_testing
          uv run python generate_report.py \
            --results-dir=results \
            --output=results/summary.md

      - name: Add summary to workflow
        if: always()
        run: |
          echo "## Load Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f e2e_playwright/load_testing/results/summary.md ]; then
            cat e2e_playwright/load_testing/results/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No summary report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          path: e2e_playwright/load_testing/results/load-test-results.json
          archive: false
          retention-days: 90
